<div class="hero">
    <p class="hero-label">Inicio</p>
    <h1 class="title">Mi Closet Inteligente</h1>
    <p class="subtitle">Explora tus prendas y descubre la esencia única de cada outfit.</p>
    <div class="hero-divider"></div>
</div>

<div class="filters">
    <app-controls (sortByName)="orderByName()" (sortByPopulation)="orderByPopulation()"></app-controls>
</div>

<div class="container">
    @for (country of countries(); track country.name) {
    <app-country-card [country]="country"></app-country-card>
  }
</div>
